<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rise embed test</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Georgia, serif; background: #f9f7f3; color: #222; padding: 20px; }
  h1 { font-size: 18px; font-weight: normal; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #777; margin-bottom: 24px; }
  .slider-row { margin-bottom: 18px; }
  .slider-label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; }
  .slider-label span { color: #555; }
  .slider-label strong { color: #222; }
  input[type=range] { width: 100%; accent-color: #c0392b; cursor: pointer; }
  .outputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 24px 0; }
  .metric { background: white; border-radius: 8px; padding: 14px; border: 1px solid #e8e4dd; }
  .metric-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: #999; margin-bottom: 4px; }
  .metric-value { font-size: 22px; color: #222; }
  .metric-unit { font-size: 12px; color: #999; margin-left: 2px; }
  canvas { width: 100%; border-radius: 8px; display: block; margin-top: 8px; background: white; border: 1px solid #e8e4dd; }
  .canvas-label { font-size: 12px; color: #888; margin-top: 16px; margin-bottom: 4px; }
  .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }
  #a11y-desc { font-size: 13px; color: #666; margin-top: 12px; line-height: 1.5; }
</style>
</head>
<body>

<h1>Wind chill calculator</h1>
<p class="subtitle">Rise embed test — sliders + canvas + dynamic output</p>

<div class="slider-row">
  <div class="slider-label">
    <span>Air temperature</span>
    <strong id="temp-out">10°C</strong>
  </div>
  <input type="range" id="temp" min="-20" max="20" value="10" step="1">
</div>

<div class="slider-row">
  <div class="slider-label">
    <span>Wind speed</span>
    <strong id="wind-out">20 km/h</strong>
  </div>
  <input type="range" id="wind" min="5" max="100" value="20" step="1">
</div>

<div class="slider-row">
  <div class="slider-label">
    <span>Humidity</span>
    <strong id="humidity-out">60%</strong>
  </div>
  <input type="range" id="humidity" min="10" max="100" value="60" step="1">
</div>

<div class="outputs">
  <div class="metric">
    <div class="metric-label">Feels like</div>
    <div class="metric-value" id="feels-like">6<span class="metric-unit">°C</span></div>
  </div>
  <div class="metric">
    <div class="metric-label">Wind chill effect</div>
    <div class="metric-value" id="chill-effect">−4<span class="metric-unit">°C</span></div>
  </div>
  <div class="metric">
    <div class="metric-label">Risk level</div>
    <div class="metric-value" id="risk-level">Low</div>
  </div>
  <div class="metric">
    <div class="metric-label">Exposed skin limit</div>
    <div class="metric-value" id="skin-limit">&gt;30<span class="metric-unit">min</span></div>
  </div>
</div>

<div class="canvas-label">Feels-like temperature gauge</div>
<canvas id="gauge" height="80" aria-label="Gauge showing feels-like temperature"></canvas>

<div id="a11y-desc" aria-live="polite"></div>

<script>
  const tempEl = document.getElementById('temp');
  const windEl = document.getElementById('wind');
  const humidityEl = document.getElementById('humidity');

  function calcWindChill(t, v) {
    if (v < 5 || t > 10) return t;
    return 13.12 + 0.6215 * t - 11.37 * Math.pow(v, 0.16) + 0.3965 * t * Math.pow(v, 0.16);
  }

  function getRisk(feelsLike) {
    if (feelsLike > 5) return { label: 'Low', color: '#27ae60' };
    if (feelsLike > -10) return { label: 'Moderate', color: '#e67e22' };
    if (feelsLike > -25) return { label: 'High', color: '#c0392b' };
    return { label: 'Extreme', color: '#7b241c' };
  }

  function getSkinLimit(feelsLike) {
    if (feelsLike > 0) return '>30 min';
    if (feelsLike > -10) return '~20 min';
    if (feelsLike > -20) return '~10 min';
    if (feelsLike > -30) return '~5 min';
    return '<2 min';
  }

  function drawGauge(feelsLike) {
    const canvas = document.getElementById('gauge');
    const dpr = window.devicePixelRatio || 1;
    const displayW = canvas.clientWidth || 400;
    canvas.width = displayW * dpr;
    canvas.height = 80 * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    const w = displayW;
    const h = 80;

    ctx.clearRect(0, 0, w, h);

    const pad = 20;
    const barY = 36;
    const barH = 16;
    const barW = w - pad * 2;

    const grad = ctx.createLinearGradient(pad, 0, pad + barW, 0);
    grad.addColorStop(0, '#2980b9');
    grad.addColorStop(0.35, '#27ae60');
    grad.addColorStop(0.65, '#e67e22');
    grad.addColorStop(1, '#c0392b');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(pad, barY, barW, barH, 8);
    ctx.fill();

    const minT = -40, maxT = 20;
    const norm = Math.max(0, Math.min(1, (feelsLike - minT) / (maxT - minT)));
    const markerX = pad + norm * barW;

    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(markerX, barY + barH / 2, 10, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#ccc';
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.fillStyle = '#444';
    ctx.font = '11px Georgia, serif';
    ctx.textAlign = 'left';
    ctx.fillText('−40°C', pad, h - 8);
    ctx.textAlign = 'center';
    ctx.fillText('−10°C', pad + barW * 0.5, h - 8);
    ctx.textAlign = 'right';
    ctx.fillText('20°C', pad + barW, h - 8);

    ctx.fillStyle = '#222';
    ctx.font = '12px Georgia, serif';
    ctx.textAlign = 'center';
    ctx.fillText(Math.round(feelsLike) + '°C', markerX, barY - 8);
  }

  function update() {
    const t = parseInt(tempEl.value);
    const v = parseInt(windEl.value);
    const h = parseInt(humidityEl.value);

    document.getElementById('temp-out').textContent = t + '°C';
    document.getElementById('wind-out').textContent = v + ' km/h';
    document.getElementById('humidity-out').textContent = h + '%';

    const feelsLike = Math.round(calcWindChill(t, v));
    const chillEffect = feelsLike - t;
    const risk = getRisk(feelsLike);

    document.getElementById('feels-like').innerHTML = feelsLike + '<span class="metric-unit">°C</span>';
    document.getElementById('chill-effect').innerHTML = (chillEffect >= 0 ? '+' : '') + chillEffect + '<span class="metric-unit">°C</span>';
    document.getElementById('risk-level').textContent = risk.label;
    document.getElementById('risk-level').style.color = risk.color;
    document.getElementById('skin-limit').innerHTML = getSkinLimit(feelsLike).replace('min', '<span class="metric-unit">min</span>');

    drawGauge(feelsLike);

    document.getElementById('a11y-desc').textContent =
      'At ' + t + ' degrees with ' + v + ' km/h wind, it feels like ' + feelsLike +
      ' degrees. Wind chill effect: ' + chillEffect + ' degrees. Risk level: ' + risk.label +
      '. Exposed skin limit: ' + getSkinLimit(feelsLike) + '.';
  }

  tempEl.addEventListener('input', update);
  windEl.addEventListener('input', update);
  humidityEl.addEventListener('input', update);
  window.addEventListener('resize', () => drawGauge(Math.round(calcWindChill(parseInt(tempEl.value), parseInt(windEl.value)))));

  update();
</script>
</body>
</html>
